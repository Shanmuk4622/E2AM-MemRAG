<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="720" viewBox="0 0 1800 720"><rect width="100%" height="100%" fill="#ffffff"/><text x="900.0" y="58" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="700" fill="#172033">E2AM-MemRAG experimental pipeline and measurement boundary</text><rect x="40" y="145" width="300" height="360" rx="24" fill="#e8f0fe" stroke="#365779" stroke-width="3"/><text x="190.0" y="203" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#172033">1. Frozen HybridBench</text><text x="190.0" y="275" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="400" fill="#172033">800 grouped scenarios</text><text x="190.0" y="333" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="400" fill="#172033">8 controlled task classes</text><text x="190.0" y="391" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="400" fill="#172033">procedurally sealed test</text><line x1="348" y1="325.0" x2="380" y2="325.0" stroke="#365779" stroke-width="5"/><polygon points="380,313.0 380,337.0 398,325.0" fill="#365779"/><rect x="390" y="145" width="300" height="360" rx="24" fill="#e8f7f0" stroke="#365779" stroke-width="3"/><text x="540.0" y="203" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#172033">2. Route execution</text><text x="540.0" y="275" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="400" fill="#172033">BM25 + dense + hybrid</text><text x="540.0" y="333" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="400" fill="#172033">flat / hierarchical / graph memory</text><text x="540.0" y="391" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="400" fill="#172033">5 pinned FP16 generators</text><line x1="698" y1="325.0" x2="730" y2="325.0" stroke="#365779" stroke-width="5"/><polygon points="730,313.0 730,337.0 748,325.0" fill="#365779"/><rect x="740" y="145" width="300" height="360" rx="24" fill="#fff4df" stroke="#365779" stroke-width="3"/><text x="890.0" y="203" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#172033">3. Measurement contract</text><text x="890.0" y="275" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="400" fill="#172033">CPU retrieval</text><text x="890.0" y="333" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="400" fill="#172033">T4 model.generate()</text><text x="890.0" y="391" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="400" fill="#172033">deterministic support guard</text><line x1="1048" y1="325.0" x2="1080" y2="325.0" stroke="#365779" stroke-width="5"/><polygon points="1080,313.0 1080,337.0 1098,325.0" fill="#365779"/><rect x="1090" y="145" width="300" height="360" rx="24" fill="#f2ecff" stroke="#365779" stroke-width="3"/><text x="1240.0" y="203" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#172033">4. Calibrated router</text><text x="1240.0" y="275" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="400" fill="#172033">5 grouped bootstraps</text><text x="1240.0" y="333" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="400" fill="#172033">isotonic success calibration</text><text x="1240.0" y="391" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="400" fill="#172033">q0.90 energy / latency</text><line x1="1398" y1="325.0" x2="1430" y2="325.0" stroke="#365779" stroke-width="5"/><polygon points="1430,313.0 1430,337.0 1448,325.0" fill="#365779"/><rect x="1440" y="145" width="300" height="360" rx="24" fill="#eaf3f8" stroke="#365779" stroke-width="3"/><text x="1590.0" y="203" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#172033">5. Sealed evaluation</text><text x="1590.0" y="275" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="400" fill="#172033">120 clean questions x 17 routes</text><text x="1590.0" y="333" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="400" fill="#172033">4 corruptions x 3 routes</text><text x="1590.0" y="391" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="400" fill="#172033">10,000 cluster bootstraps</text><rect x="760" y="298" width="260" height="70" rx="12" fill="none" stroke="#c43d3d" stroke-width="5" stroke-dasharray="12 8"/><text x="890.0" y="445" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#a92727">NVML energy window</text><text x="900.0" y="580" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="600" fill="#172033">Energy: selected-GPU board power integrated only over model.generate().  Latency: retrieval + generator call; policy adds probe/router components.</text><text x="900.0" y="625" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="400" fill="#a92727">Post-generation parsing, verification, CPU energy, whole-system energy, and carbon are outside the measured energy boundary.</text></svg>
