name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project and test dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev,kaggle]"

      - name: Lint
        run: python -m ruff check src tests scripts

      - name: Run regression suite
        env:
          PYTHONPATH: src
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Exercise local resume validation
        env:
          PYTHONPATH: src
        run: python scripts/validate_project.py

      - name: Validate deterministic notebook release
        run: python scripts/build_experiment_notebooks.py --check
